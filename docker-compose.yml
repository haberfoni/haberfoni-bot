version: '3.8'

services:
  bot:
    build: .
    container_name: haberfoni_bot
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql://haberfoni_user:Haberfoni_Secur3!DB@db:3306/haberfoni}
    networks:
      - app_network

networks:
  app_network:
    external: true
    name: haberfoni-backend_app_network
